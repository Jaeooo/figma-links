<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figma Links</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1e1e1e; color: #e0e0e0; display: flex; flex-direction: column; height: 100vh; }
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }

  /* Header */
  .header { background: #252525; border-bottom: 1px solid #3a3a3a; padding: 0 20px; flex-shrink: 0; }
  .header-top { display: flex; align-items: center; gap: 12px; padding: 12px 0 10px; }
  .header-title { font-size: 14px; font-weight: 600; color: #fff; white-space: nowrap; }
  .header-sub { font-size: 12px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Page tabs with scroll indicators */
  .page-tabs-wrap { position: relative; }
  .page-tabs-wrap::before,
  .page-tabs-wrap::after { content: ''; position: absolute; top: 0; bottom: 0; width: 24px; pointer-events: none; z-index: 1; transition: opacity 0.2s; opacity: 0; }
  .page-tabs-wrap::before { left: 0; background: linear-gradient(to right, #252525, transparent); }
  .page-tabs-wrap::after  { right: 0; background: linear-gradient(to left, #252525, transparent); }
  .page-tabs-wrap.can-scroll-left::before  { opacity: 1; }
  .page-tabs-wrap.can-scroll-right::after  { opacity: 1; }
  .page-tabs { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 0; scrollbar-width: none; }
  .page-tabs::-webkit-scrollbar { display: none; }
  .page-tab { padding: 8px 16px; font-size: 13px; cursor: pointer; border-radius: 6px 6px 0 0; color: #aaa; white-space: nowrap; border: 1px solid transparent; border-bottom: none; transition: background 0.15s; }
  .page-tab:hover { background: #2e2e2e; color: #ddd; }
  .page-tab.active { background: #1e1e1e; color: #fff; border-color: #3a3a3a; font-weight: 600; }
  .page-tab.failed { color: #f87171; }
  .page-tab.failed::after { content: ' ⚠'; font-size: 11px; }
  .page-tabs-placeholder { padding: 8px 0; font-size: 12px; color: #666; }

  /* Main */
  .main { flex: 1; overflow-y: auto; padding: 24px; }

  .loading { text-align: center; padding: 60px; color: #888; }
  .loading .spinner { display: inline-block; width: 28px; height: 28px; border: 2px solid #555; border-top-color: #0d99ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error { background: #ef444433; border: 1px solid #ef4444; border-radius: 8px; padding: 12px 16px; color: #fca5a5; font-size: 13px; }
  .warning { background: #f59e0b22; border: 1px solid #f59e0b; border-radius: 8px; padding: 10px 14px; color: #fcd34d; font-size: 12px; margin-bottom: 16px; }

  .empty-state { text-align: center; padding: 80px 20px; color: #555; }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 14px; }

  /* Frame grid */
  .frame-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
  .frame-card { background: #252525; border: 1px solid #3a3a3a; border-radius: 10px; overflow: hidden; transition: border-color 0.15s; }
  .frame-card:hover { border-color: #555; }
  .frame-card.unchecked { opacity: 0.45; }
  .frame-thumb { width: 100%; aspect-ratio: 4/3; background: #111; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; }
  .frame-thumb img { display: block; width: 100%; height: 100%; object-fit: contain; }
  .thumb-fail { font-size: 11px; color: #666; text-align: center; padding: 12px; }
  .frame-footer { padding: 10px 12px; display: flex; align-items: center; gap: 8px; }
  .frame-footer input[type="checkbox"] { width: 15px; height: 15px; accent-color: #0d99ff; cursor: pointer; flex-shrink: 0; }
  .frame-name { font-size: 13px; font-weight: 500; color: #e0e0e0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; user-select: none; }

  /* Save bar */
  .save-bar { position: sticky; bottom: 0; background: #1e1e1e; border-top: 1px solid #3a3a3a; padding: 14px 24px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .save-bar-info { font-size: 12px; color: #888; flex: 1; }
  .select-all-btn { background: #333; color: #ccc; border: 1px solid #555; padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .select-all-btn:hover { background: #3a3a3a; }
  .save-btn { background: #15803d; color: #fff; border: none; padding: 9px 20px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .save-btn:hover { background: #166534; }
  .save-btn:disabled { background: #555; cursor: default; }
  .save-btn .btn-spinner { display: none; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
  .save-btn.loading .btn-spinner { display: inline-block; }
</style>
</head>
<body>

<div id="figma-config-fields" class="sr-only" aria-hidden="true">
  <input type="hidden" id="tokenInput" autocomplete="off" />
  <input type="hidden" id="urlInput" autocomplete="off" />
  <button type="button" id="loadBtn" onclick="loadFile()" tabindex="-1"></button>
</div>

<div class="header">
  <div class="header-top">
    <span class="header-title" id="headerTitle">Figma Links</span>
    <span class="header-sub" id="headerSub"></span>
  </div>
  <div class="page-tabs-wrap" id="pageTabsWrap">
    <div class="page-tabs" id="pageTabs">
      <div class="page-tabs-placeholder">Loading...</div>
    </div>
  </div>
</div>

<div class="main" id="main">
  <div class="empty-state">
    <div class="icon">📐</div>
    <p>Loading Figma file...</p>
  </div>
</div>

<div class="save-bar" id="saveBar" style="display:none">
  <span class="save-bar-info" id="saveBarInfo"></span>
  <button class="select-all-btn" onclick="toggleSelectAll()">Select / Deselect All</button>
  <button class="save-btn" id="saveBtn" onclick="exportSelectedFramesMarkdown()">
    <span class="btn-spinner"></span>
    <span class="btn-label">Save as Markdown</span>
  </button>
</div>

<script>
const API_BASE = 'https://api.figma.com/v1';
const API_TIMEOUT_MS = 30000;
let fileData = null;
let pagesData = {};
let pageLoadState = {}; // 'loading' | 'ok' | 'failed'
let currentFileKey = '';
let currentPageId = '';

function getToken() { return document.getElementById('tokenInput').value.trim(); }

function extractFileKey(url) {
  const m = url.match(/figma\.com\/(?:file|design)\/([a-zA-Z0-9]+)/);
  return m ? m[1] : url.trim();
}

async function apiFetch(path) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), API_TIMEOUT_MS);
  try {
    const res = await fetch(`${API_BASE}${path}`, {
      headers: { 'X-FIGMA-TOKEN': getToken() },
      signal: controller.signal,
    });
    if (!res.ok) throw new Error(`API ${res.status}: ${res.statusText}`);
    return res.json();
  } catch (e) {
    if (e.name === 'AbortError') throw new Error('Request timed out (30s). Check your connection and try again.');
    throw e;
  } finally {
    clearTimeout(timer);
  }
}

async function loadFile() {
  const token = getToken();
  const url = document.getElementById('urlInput').value.trim();
  if (!token || !url) return;

  currentFileKey = extractFileKey(url);
  pagesData = {};
  pageLoadState = {};

  document.getElementById('pageTabs').innerHTML = '<div class="page-tabs-placeholder">Loading pages...</div>';
  document.getElementById('main').innerHTML = '<div class="loading"><div class="spinner"></div><br>Loading...</div>';

  try {
    fileData = await apiFetch(`/files/${currentFileKey}?depth=1`);
    const pages = fileData.document.children;

    document.getElementById('headerTitle').textContent = fileData.name;
    document.getElementById('headerSub').textContent = `${pages.length} page${pages.length !== 1 ? 's' : ''}`;

    // mark all pages as loading
    pages.forEach(p => { pageLoadState[p.id] = 'loading'; });
    renderPageTabs(pages);

    // load each page node sequentially
    for (const page of pages) {
      try {
        const nodeData = await apiFetch(`/files/${currentFileKey}/nodes?ids=${page.id}&depth=3`);
        pagesData[page.id] = nodeData.nodes[page.id]?.document;
        pageLoadState[page.id] = 'ok';
        updatePageTab(page.id);
        // refresh grid if this page is currently visible
        if (page.id === currentPageId) renderFrameGrid(pagesData[page.id]);
      } catch (e) {
        pageLoadState[page.id] = 'failed';
        updatePageTab(page.id);
        console.warn(`Failed to load page ${page.name}:`, e);
        if (page.id === currentPageId) {
          document.getElementById('main').innerHTML =
            `<div class="error" style="margin:0">❌ Failed to load page "${esc(page.name)}": ${esc(e.message)}</div>`;
        }
      }
    }
  } catch (e) {
    document.getElementById('pageTabs').innerHTML = '';
    document.getElementById('main').innerHTML = `<div class="error">❌ ${esc(e.message)}</div>`;
  }
}

function renderPageTabs(pages) {
  let html = '';
  for (const page of pages) {
    html += `<div class="page-tab" id="tab-${page.id.replace(':','-')}" onclick="selectPage('${page.id}')">${esc(page.name)}</div>`;
  }
  document.getElementById('pageTabs').innerHTML = html;
  setupTabScrollIndicators();

  // auto-select first page
  if (pages.length > 0) selectPage(pages[0].id);
}

function updatePageTab(pageId) {
  const tab = document.getElementById(`tab-${pageId.replace(':','-')}`);
  if (!tab) return;
  if (pageLoadState[pageId] === 'failed') tab.classList.add('failed');
  else tab.classList.remove('failed');
}

function setupTabScrollIndicators() {
  const tabs = document.getElementById('pageTabs');
  const wrap = document.getElementById('pageTabsWrap');
  function update() {
    wrap.classList.toggle('can-scroll-left',  tabs.scrollLeft > 4);
    wrap.classList.toggle('can-scroll-right', tabs.scrollLeft + tabs.clientWidth < tabs.scrollWidth - 4);
  }
  tabs.addEventListener('scroll', update, { passive: true });
  // re-check on resize
  new ResizeObserver(update).observe(tabs);
  update();
}

function selectPage(pageId) {
  currentPageId = pageId;
  document.querySelectorAll('.page-tab').forEach(el => el.classList.remove('active'));
  const tab = document.getElementById(`tab-${pageId.replace(':','-')}`);
  if (tab) tab.classList.add('active');

  if (pageLoadState[pageId] === 'failed') {
    document.getElementById('main').innerHTML =
      `<div class="error" style="margin:0">❌ This page failed to load. <a href="#" style="color:#fca5a5" onclick="retryPage('${pageId}');return false">Retry</a></div>`;
    document.getElementById('saveBar').style.display = 'none';
    return;
  }

  const data = pagesData[pageId];
  if (!data) {
    document.getElementById('main').innerHTML = '<div class="loading"><div class="spinner"></div><br>Loading page...</div>';
    document.getElementById('saveBar').style.display = 'none';
    return;
  }
  renderFrameGrid(data);
}

async function retryPage(pageId) {
  const pageName = fileData?.document?.children?.find(p => p.id === pageId)?.name || pageId;
  document.getElementById('main').innerHTML = '<div class="loading"><div class="spinner"></div><br>Retrying...</div>';
  pageLoadState[pageId] = 'loading';
  updatePageTab(pageId);
  try {
    const nodeData = await apiFetch(`/files/${currentFileKey}/nodes?ids=${pageId}&depth=3`);
    pagesData[pageId] = nodeData.nodes[pageId]?.document;
    pageLoadState[pageId] = 'ok';
    updatePageTab(pageId);
    renderFrameGrid(pagesData[pageId]);
  } catch (e) {
    pageLoadState[pageId] = 'failed';
    updatePageTab(pageId);
    document.getElementById('main').innerHTML =
      `<div class="error" style="margin:0">❌ Failed to load "${esc(pageName)}": ${esc(e.message)} <a href="#" style="color:#fca5a5;margin-left:8px" onclick="retryPage('${pageId}');return false">Retry</a></div>`;
  }
}

async function renderFrameGrid(pageNode) {
  const main = document.getElementById('main');
  const frames = (pageNode.children || []).filter(c => c.type === 'FRAME');

  if (frames.length === 0) {
    main.innerHTML = '<div class="empty-state"><div class="icon">🖼</div><p>No top-level frames found on this page.<br><small style="color:#666;font-size:12px">Only top-level FRAME nodes are listed.</small></p></div>';
    document.getElementById('saveBar').style.display = 'none';
    return;
  }

  // show loading state first
  main.innerHTML = '<div class="loading"><div class="spinner"></div><br>Loading thumbnails...</div>';
  document.getElementById('saveBar').style.display = 'none';

  let idToUrl = {};
  let failedBatches = 0;
  try {
    const result = await fetchImageUrlMap(frames.map(f => f.id));
    idToUrl = result.urls;
    failedBatches = result.failedBatches;
  } catch (e) {
    console.warn('Failed to load image URLs:', e);
  }

  let html = '';
  if (failedBatches > 0) {
    html += `<div class="warning">⚠ ${failedBatches} thumbnail batch${failedBatches > 1 ? 'es' : ''} failed to load — you may have hit Figma's rate limit. Frames are still selectable.</div>`;
  }

  html += '<div class="frame-grid">';
  for (const f of frames) {
    const url = idToUrl[f.id];
    const nodeIdAttr = escAttr(f.id);
    const nameAttr = escAttr(f.name);
    html += `<div class="frame-card" id="card-${nodeIdAttr.replace(/:/g,'-')}">`;
    html += `<div class="frame-thumb" onclick="toggleCard('${nodeIdAttr}')">`;
    if (url) {
      html += `<img src="${esc(url)}" alt="" loading="lazy" onerror="this.parentNode.innerHTML='<div class=thumb-fail>Failed to load</div>'" />`;
    } else {
      html += `<div class="thumb-fail">No preview</div>`;
    }
    html += `</div>`;
    html += `<div class="frame-footer">`;
    html += `<input type="checkbox" class="top-frame-cb" data-node-id="${nodeIdAttr}" data-frame-name="${nameAttr}" checked onchange="onCheckChange()" />`;
    html += `<span class="frame-name" onclick="toggleCard('${nodeIdAttr}')" title="${nameAttr}">${esc(f.name)}</span>`;
    html += `</div></div>`;
  }
  html += '</div>';
  main.innerHTML = html;

  document.getElementById('saveBar').style.display = 'flex';
  updateSaveBarInfo();
}

function toggleCard(nodeId) {
  const safe = nodeId.replace(/:/g, '-');
  const card = document.getElementById(`card-${safe}`);
  if (!card) return;
  const cb = card.querySelector('.top-frame-cb');
  if (!cb) return;
  cb.checked = !cb.checked;
  onCheckChange();
}

function onCheckChange() {
  document.querySelectorAll('.frame-card').forEach(card => {
    const cb = card.querySelector('.top-frame-cb');
    card.classList.toggle('unchecked', cb && !cb.checked);
  });
  updateSaveBarInfo();
}

function updateSaveBarInfo() {
  const all = document.querySelectorAll('.top-frame-cb');
  const checked = document.querySelectorAll('.top-frame-cb:checked');
  document.getElementById('saveBarInfo').textContent = `${checked.length} / ${all.length} frame${all.length !== 1 ? 's' : ''} selected`;
}

function toggleSelectAll() {
  const all = document.querySelectorAll('.top-frame-cb');
  const allChecked = [...all].every(cb => cb.checked);
  all.forEach(cb => { cb.checked = !allChecked; });
  onCheckChange();
}

async function fetchImageUrlMap(nodeIds) {
  if (!nodeIds.length) return { urls: {}, failedBatches: 0 };
  const BATCH = 40;
  const merged = {};
  let failedBatches = 0;
  for (let i = 0; i < nodeIds.length; i += BATCH) {
    const batch = nodeIds.slice(i, i + BATCH);
    const qs = 'ids=' + batch.map(id => encodeURIComponent(id)).join(',') + '&format=png&scale=0.5';
    try {
      const data = await apiFetch(`/images/${currentFileKey}?${qs}`);
      if (data.images) Object.assign(merged, data.images);
    } catch (e) {
      failedBatches++;
      console.warn(`Image batch ${i / BATCH + 1} failed:`, e);
    }
  }
  return { urls: merged, failedBatches };
}

function figmaLinkToSelection(nodeId) {
  const q = String(nodeId).replace(/:/g, '-');
  return `https://www.figma.com/design/${currentFileKey}?node-id=${encodeURIComponent(q)}`;
}

function escapeMdLine(s) {
  return String(s).replace(/\r?\n/g, ' ').trim();
}

async function exportSelectedFramesMarkdown() {
  const boxes = document.querySelectorAll('#main .top-frame-cb:checked');
  if (!boxes.length) {
    alert('No frames selected. Please check at least one frame.');
    return;
  }
  const title = fileData && fileData.name ? fileData.name : currentFileKey;
  let md = `# Figma — Link to selection\n\n`;
  md += `File: **${escapeMdLine(title)}**\n\n`;
  for (const cb of boxes) {
    const id = cb.getAttribute('data-node-id');
    const name = escapeMdLine(cb.getAttribute('data-frame-name') || id);
    md += `- ${name} — ${figmaLinkToSelection(id)}\n`;
  }
  md += `\n`;

  const filename = `figma-links-${currentFileKey}.md`.replace(/[^\w.\-]/g, '_');
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.classList.add('loading');
  btn.querySelector('.btn-label').textContent = 'Saving...';

  try {
    const r = await fetch('/api/save-markdown', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: md, filename })
    });
    const j = await r.json().catch(() => ({}));
    if (r.ok && j.ok && j.path) {
      try {
        await fetch('/api/shutdown', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}', keepalive: true });
      } catch (_) {}
      alert(`Saved: ${j.path}`);
      window.close();
      return;
    }
    throw new Error((j && j.error) ? j.error : (r.statusText || 'Save failed'));
  } catch (e) {
    const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
    alert('Server save failed — downloaded via browser instead.\n' + (e && e.message ? e.message : ''));
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.querySelector('.btn-label').textContent = 'Save as Markdown';
  }
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escAttr(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/'/g,'&#39;');
}

// init: populate from figma-config.json + query params, then auto-load
(async function init() {
  try {
    const r = await fetch('figma-config.json', { cache: 'no-store' });
    if (r.ok) {
      const cfg = await r.json();
      if (cfg.token) document.getElementById('tokenInput').value = String(cfg.token).trim();
      if (cfg.fileUrl) document.getElementById('urlInput').value = String(cfg.fileUrl).trim();
    }
  } catch (_) {}
  const params = new URLSearchParams(location.search);
  if (params.get('url')) document.getElementById('urlInput').value = params.get('url');
  if (params.get('token')) document.getElementById('tokenInput').value = params.get('token');

  if (getToken() && document.getElementById('urlInput').value.trim()) {
    await loadFile();
  } else {
    document.getElementById('pageTabs').innerHTML = '';
    document.getElementById('main').innerHTML =
      '<div class="error" style="margin:20px">Add <code>token</code> and <code>fileUrl</code> to figma-config.json, or pass <code>?url=</code> and <code>?token=</code> as query parameters and reload.</div>';
  }
})();
</script>
</body>
</html>
